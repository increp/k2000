name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: windows
    runs-on: windows-2022
    # Windows is the only trusted artifact for testing (Ableton 12). Linux dev
    # builds happen locally; CI is Windows-exclusive for now.
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --config Release -j

      - name: Run tests
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: k2000-windows-${{ github.sha }}
          path: build/k2000_artefacts/Release/VST3/k2000.vst3
          if-no-files-found: error
